name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# TODO#0: DONE — permissions declared below
# Scanners need: (a) read code, (b) upload SARIF, (c) comment on PRs/issues, (d) OIDC tokens
permissions:
  contents: read
  security-events: write  # TODO#0a: required for SARIF upload to GitHub Security tab
  pull-requests: write    # TODO#0b: so Gitleaks/Sonar can comment on PRs
  issues: write           # TODO#0b: so Gitleaks/Sonar can comment on issues
  id-token: write         # TODO#0c: required for OIDC token
  actions: read

jobs:
    # GATE#0: Secret scanning (TruffleHog + Gitleaks)
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
              # this step checks out the code so scanners can analyze it.
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                # TODO#1: DONE — fetch-depth: 0 gives TruffleHog full git history to diff base..HEAD across all commits
                fetch-depth: 0

              # TruffleHog scans code + commit history for verified secrets (live creds). It can be noisy, but is a great first line of defense.
            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true # NOTE THAT THIS IS NOT A BEST PRACTICE — ideally we would fail here and fix secrets before moving on to later gates, but for demo purposes we want to see results from all scanners.
              with:
                path: ./
                # TODO#2: DONE — base is the default branch, head is current HEAD
                base: ${{ github.event.repository.default_branch }}
                head: HEAD
                # TODO#3: DONE — --only-verified reports ONLY verified (live) secrets to reduce noise
                extra_args: --only-verified

            # Gitleaks scans code + history for regex patterns that look like secrets. It can be more accurate than TruffleHog, but may miss live creds that don't match known patterns.
            # TODO#4: DONE — Gitleaks step added below
            # Q: TruffleHog = attempts to verify secrets are live/active credentials; Gitleaks = regex pattern matching, faster but no verification
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
                GITLEAKS_ENABLE_SUMMARY: true

    # GATE#1a: SAST via SonarQube
    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning # this line means "you need to finish the secret-scanning job before starting this one (sast-scan)"
        if: ${{ !cancelled() }}
        # the above line means "only run this job if the workflow hasn't been cancelled by a previous job (e.g. secret-scanning)"
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                # TODO#5: DONE — fetch-depth: 0 gives Sonar full history for blame/new-code detection
                fetch-depth: 0

            # TODO#6: DONE — SonarQube scan step added
            # Q: SonarQube findings show in the SonarQube dashboard (NOT GitHub Security tab) because it uses its own
            #    proprietary format rather than SARIF. GitHub Security tab only accepts SARIF-formatted reports.
            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v7.1.0
              continue-on-error: true
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # GATE#1b: SAST via CodeQL (results in GitHub Security tab)
    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        strategy:
            matrix:
                # TODO#7: DONE — Next.js/React is written in JavaScript/TypeScript → use 'javascript'
                language: [ 'javascript' ]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

              # CodeQL is GitHub's native code scanning solution that uses a powerful query language to find security and quality issues. It integrates directly with the GitHub Security tab and can be customized with your own queries.
            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                # TODO#8: DONE — enable both suites
                # security-extended    → OWASP/CWE Top 25 + extra vulnerability checks
                # security-and-quality → security-extended + maintainability/code quality rules
                # Q: Use BOTH because security-and-quality is a strict superset — it catches everything security-extended does
                #    PLUS code quality issues (dead code, complex methods) that can hide bugs.
                # Q: Yes, custom .ql queries are possible — you'd write a CodeQL query file that models a dataflow
                #    source→sink path specific to your codebase.
                queries: security-extended,security-and-quality

            # TODO#9: DONE — CodeQL analyze step added
            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                category: "/language:${{ matrix.language }}"

    # GATE#2: Dependency scanning via OWASP Dependency-Check (SARIF + HTML)
    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#10: DONE — set up Node 20
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            # TODO#11: DONE — install npm deps so Dependency-Check can resolve the full dependency tree
            - name: Install dependencies
              run: npm ci

              # OWASP Dependency-Check is a popular open-source tool that scans your dependencies for known vulnerabilities. It can output results in SARIF format for GitHub Security tab integration, as well as HTML for human-readable reports.
            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true # NOTE THAT THIS IS NOT A BEST PRACTICE — ideally we would fail here and fix secrets before moving on to later gates, but for demo purposes we want to see results from all scanners.
              id: Depcheck # give this step an ID so we can reference its outputs in later steps (e.g. for SARIF upload)
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.' # scan current directory (which should be the repo root after checkout)
                # TODO#12: DONE — SARIF integrates with GitHub Security tab (SARIF = Security Analysis Results Interchange Format)
                format: 'SARIF'
                out: 'reports'
                # TODO#13: DONE — fail on CVSS >= 7.0 (HIGH severity threshold)
                args: >
                    --failOnCVSS 7
                    --enableRetired

            # TODO#14: DONE — upload Depcheck SARIF to GitHub Security tab
            - name: Upload Depcheck SARIF to Security tab
              if: always()
              #the above line meant to upload SARIF even if the Depcheck step fails (e.g. due to high CVSS findings), so that we can see results in Security tab and fix issues.
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                  sarif_file: reports/dependency-check-report.sarif
                  category: dependency-check

            # TODO#15: DONE — upload raw Depcheck report folder as artifact
            - name: Upload Depcheck HTML report as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: depcheck-report
                path: reports/

    # GATE#3: Container/Image scanning via Trivy (SARIF + artifact)
    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#16: DONE — build Docker image tagged my-app:latest
            - name: Build Docker image
              run: docker build -t my-app:latest .

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                # TODO#17: DONE — sarif format integrates with GitHub Security tab
                format: 'sarif'
                output: 'trivy-results.sarif'
                # TODO#18: DONE — report CRITICAL and HIGH severities (actionable findings; LOW/MEDIUM add noise)
                severity: 'CRITICAL,HIGH'
                # TODO#19: DONE — ignore unfixed CVEs so pipeline doesn't block on vulnerabilities with no available patch
                ignore-unfixed: true

            # TODO#20: DONE — upload Trivy SARIF to GitHub Security tab
            - name: Upload Trivy SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                sarif_file: trivy-results.sarif
                category: trivy

            # TODO#21: DONE — upload trivy-results.sarif as workflow artifact
            - name: Upload Trivy SARIF as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: trivy-report
                path: trivy-results.sarif

    # GATE#4: IaC scanning (Since there is no infrastructure cod here and it is out of scope for this class so we could skip it HELL YEAH!)
    # GATE#5: DAST (We have OWASP ZAP workshop here so we can skip this one too! YOHOOO!)
